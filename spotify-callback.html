<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting Spotify…</title>
  <style>
    body { margin:0; background:#0a0a0a; color:#fff; font-family:system-ui,sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .box { text-align:center; padding:24px; }
    .spin { width:32px; height:32px; border:3px solid #333; border-top-color:#1DB954;
            border-radius:50%; margin:0 auto 16px; animation:s 0.8s linear infinite; }
    @keyframes s { to { transform:rotate(360deg); } }
    .msg { font-size:14px; color:#aaa; }
    .err { color:#ff5a5a; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin" id="spin"></div>
    <div class="msg" id="msg">Connecting your Spotify account…</div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');
      var state = params.get('state');
      var msg = document.getElementById('msg');
      var spin = document.getElementById('spin');

      function done(text, isErr) {
        spin.style.display = 'none';
        msg.textContent = text;
        if (isErr) msg.className = 'msg err';
      }

      if (window.opener) {
        try {
          window.opener.postMessage(
            { source: 'spotify-oauth', code: code, error: error, state: state },
            window.location.origin
          );
        } catch (e) {}
        done(error ? 'Connection cancelled. You can close this window.'
                   : 'Connected! Closing…', !!error);
        setTimeout(function () { window.close(); }, error ? 2500 : 800);
      } else {
        done('Open this from the admin panel "Connect Spotify" button.', true);
      }
    })();
  </script>
</body>
</html>
