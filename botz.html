<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06060A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BOTZ — if you know you know</title>
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── BOTZ-SPECIFIC OVERRIDES ── */
    .botz-page {
      min-height: 100vh;
      background: var(--bg-abyss);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .botz-topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(6,6,10,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .botz-back-btn {
      background: none;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 5px 11px;
      font-family: var(--font-mono);
      font-size: 0.625rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .botz-back-btn:hover { color: var(--text-primary); border-color: var(--border-mid); }

    .botz-brand {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .botz-brand-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 6px;
      color: var(--red-core);
      line-height: 1;
      text-shadow: 0 0 20px var(--red-glow);
    }
    .botz-brand-sub {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 2px;
      color: var(--text-ghost);
      text-transform: uppercase;
    }

    .botz-agent-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .botz-agent-chip-label {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 2px;
      color: var(--text-ghost);
      text-transform: uppercase;
    }
    .botz-agent-chip-no {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--red-core);
    }

    /* ── HERO ── */
    .botz-hero {
      padding: 28px 16px 20px;
      text-align: center;
      position: relative;
    }
    .botz-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red-border), transparent);
    }
    .botz-hero-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 4px;
      color: var(--text-ghost);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .botz-hero-count {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(3rem, 14vw, 5rem);
      color: var(--red-core);
      text-shadow: 0 0 40px var(--red-glow), 0 0 80px rgba(255,20,95,0.15);
      line-height: 1;
      letter-spacing: -2px;
    }
    .botz-hero-unit {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 5px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── DATE FILTER ── */
    .botz-filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 16px 0;
      flex-wrap: wrap;
    }
    .botz-filter-label {
      font-family: var(--font-mono);
      font-size: 0.575rem;
      letter-spacing: 2px;
      color: var(--text-ghost);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .botz-date-input {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-family: var(--font-mono);
      font-size: 0.625rem;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      flex: 1;
      min-width: 100px;
    }
    .botz-date-input:focus { border-color: var(--red-border); background: var(--red-whisper); }
    .botz-date-input::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }

    .botz-filter-actions { display: flex; gap: 6px; }

    /* ── TABS ── */
    .botz-tabs {
      display: flex;
      gap: 4px;
      padding: 16px 16px 0;
    }
    .botz-tab-btn {
      flex: 1;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle);
      color: var(--text-ghost);
      font-family: var(--font-mono);
      font-size: 0.575rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 9px 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .botz-tab-btn.active {
      background: var(--red-whisper);
      border-color: var(--red-border);
      color: var(--red-core);
      text-shadow: 0 0 8px var(--red-glow);
    }
    .botz-tab-btn:hover:not(.active) {
      border-color: var(--border-mid);
      color: var(--text-muted);
    }

    /* ── PANEL ── */
    .botz-panel { display: none; padding: 12px 16px calc(32px + env(safe-area-inset-bottom)); }
    .botz-panel.active { display: block; }

    .botz-section-label {
      font-family: var(--font-mono);
      font-size: 0.575rem;
      letter-spacing: 3px;
      color: var(--text-ghost);
      text-transform: uppercase;
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 8px;
    }

    /* ── TRACK ROW ── */
    .botz-row-list { display: flex; flex-direction: column; gap: 3px; }

    .botz-track-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      cursor: default;
    }
    .botz-track-row:hover {
      background: rgba(255,255,255,0.04);
      border-color: var(--border-light);
    }
    /* bar fill */
    .botz-track-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(255,20,95,0.06), transparent);
      width: var(--bar-w, 0%);
      pointer-events: none;
      transition: width 0.6s var(--ease-out);
    }
    /* top glow line for #1 */
    .botz-track-row.rank-1 {
      border-color: rgba(255,20,95,0.18);
      background: rgba(255,20,95,0.04);
    }
    .botz-track-row.rank-1::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red-core), transparent);
    }

    .botz-rank {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--text-ghost);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
      line-height: 1;
    }
    .botz-track-row.rank-1 .botz-rank { color: var(--red-core); font-weight: 700; }

    .botz-row-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255,20,95,0.08);
      border: 1px solid var(--red-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .botz-track-row.rank-1 .botz-row-icon {
      background: rgba(255,20,95,0.15);
      border-color: rgba(255,20,95,0.3);
    }

    .botz-row-info { flex: 1; min-width: 0; }
    .botz-row-name {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }
    .botz-row-sub {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .botz-row-count {
      flex-shrink: 0;
      text-align: right;
    }
    .botz-row-count-num {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 800;
      color: var(--red-core);
      line-height: 1;
    }
    .botz-track-row.rank-1 .botz-row-count-num {
      text-shadow: 0 0 12px var(--red-glow);
    }
    .botz-row-count-label {
      font-family: var(--font-mono);
      font-size: 0.48rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* ── RECENT ROW ── */
    .botz-recent-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      transition: border-color 0.15s;
    }
    .botz-recent-row:hover { border-color: var(--border-light); }

    .botz-recent-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--red-core);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--red-glow);
    }
    .botz-recent-info { flex: 1; min-width: 0; }
    .botz-recent-name {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .botz-recent-meta {
      font-family: var(--font-mono);
      font-size: 0.53rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .botz-recent-time {
      font-family: var(--font-mono);
      font-size: 0.53rem;
      color: var(--text-muted);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    /* ── LOADING / EMPTY ── */
    .botz-loading, .botz-empty {
      text-align: center;
      padding: 48px 20px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-ghost);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .botz-spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,20,95,0.15);
      border-top-color: var(--red-core);
      border-radius: 50%;
      animation: botz-spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes botz-spin { to { transform: rotate(360deg); } }

    /* ── DATE PRESETS ── */
    .botz-presets {
      display: flex;
      gap: 6px;
      padding: 10px 16px 0;
      flex-wrap: wrap;
    }
    .botz-preset-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle);
      color: var(--text-ghost);
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .botz-preset-btn:hover {
      border-color: var(--border-mid);
      color: var(--text-muted);
    }
    .botz-preset-btn.active {
      background: var(--red-whisper);
      border-color: var(--red-border);
      color: var(--red-core);
    }

    /* ── SKELETON LOADING ── */
    .botz-skeleton-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
    }
    .botz-skel {
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 75%);
      background-size: 200% 100%;
      animation: botz-shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes botz-shimmer { to { background-position: -200% 0; } }
    .botz-skel-icon { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; }
    .botz-skel-lines { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .botz-skel-name { height: 12px; width: 60%; }
    .botz-skel-sub  { height: 8px;  width: 35%; }
    .botz-skel-num  { width: 28px;  height: 16px; flex-shrink: 0; }

    /* ── LAST UPDATED ── */
    .botz-updated {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 1.5px;
      color: var(--text-ghost);
      text-align: right;
      padding: 8px 16px 0;
      opacity: 0.7;
    }

    /* ── PULL-TO-REFRESH ── */
    .botz-ptr {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      overflow: hidden;
      height: 0;
      transition: height 0.2s;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 2px;
      color: var(--text-ghost);
      text-transform: uppercase;
    }
    .botz-ptr.visible { height: 40px; }
    .botz-ptr-arrow {
      font-size: 0.8rem;
      transition: transform 0.2s;
      display: inline-block;
    }
    .botz-ptr.ready .botz-ptr-arrow { transform: rotate(180deg); color: var(--red-core); }

    /* ── RETRY BUTTON ── */
    .botz-retry-btn {
      display: inline-block;
      margin-top: 10px;
      background: none;
      border: 1px solid var(--red-border);
      color: var(--red-core);
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s;
    }
    .botz-retry-btn:hover { background: var(--red-whisper); }

    /* ── TABS (underline style) ── */
    .botz-tab-btn.active {
      background: var(--red-whisper);
      border-color: transparent;
      border-bottom-color: var(--red-core);
      color: var(--red-core);
      text-shadow: 0 0 8px var(--red-glow);
    }

    /* ── NOW PLAYING ── */
    .botz-np {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: rgba(167,139,250,0.06);
      border-bottom: 1px solid var(--purple-border);
    }
    .botz-np.visible { display: flex; }
    .botz-np-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--purple-core);
      flex-shrink: 0;
      animation: botz-np-pulse 1.8s ease-in-out infinite;
    }
    @keyframes botz-np-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .botz-np-label {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--purple-core);
    }
    .botz-np-track {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.2px;
    }
    .botz-np-artist {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .botz-np-info { flex: 1; min-width: 0; }
    .botz-np-live {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 0.48rem;
      letter-spacing: 2px;
      color: rgba(167,139,250,0.45);
      text-transform: uppercase;
    }

    /* ── NOT LOGGED IN ── */
    .botz-not-logged {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 24px;
      text-align: center;
    }
    .botz-not-logged-icon { font-size: 2rem; }
    .botz-not-logged-title {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--text-muted);
    }
    .botz-not-logged-sub {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--text-ghost);
    }
  </style>
</head>
<body class="botz-page">

<!-- ── TOP BAR ── -->
<header class="botz-topbar">
  <a href="dashboard.html" class="botz-back-btn">← BACK</a>
  <div class="botz-brand">
    <div class="botz-brand-name">BOTZ</div>
    <div class="botz-brand-sub">if you know you know</div>
  </div>
  <div class="botz-agent-chip">
    <span class="botz-agent-chip-label">AGENT</span>
    <span class="botz-agent-chip-no" id="displayAgentNo">—</span>
  </div>
</header>

<!-- ── MAIN CONTENT (hidden until loaded) ── -->
<div id="mainContent" style="display:none; flex:1; flex-direction:column;">

  <!-- NOW PLAYING -->
  <div class="botz-np" id="nowPlayingBar">
    <div class="botz-np-dot"></div>
    <div class="botz-np-info">
      <div class="botz-np-label">Now Playing</div>
      <div class="botz-np-track" id="npTrack"></div>
      <div class="botz-np-artist" id="npArtist"></div>
    </div>
    <div class="botz-np-live">Live</div>
  </div>

  <!-- PULL-TO-REFRESH -->
  <div class="botz-ptr" id="ptrBar">
    <span class="botz-ptr-arrow">↓</span>
    <span id="ptrText">Pull to refresh</span>
  </div>

  <!-- HERO -->
  <div class="botz-hero">
    <div class="botz-hero-label">Total Jams</div>
    <div class="botz-hero-count" id="heroTotal">—</div>
    <div class="botz-hero-unit">jams logged</div>
  </div>

  <!-- DATE PRESETS -->
  <div class="botz-presets">
    <button class="botz-preset-btn active" data-preset="all" onclick="applyPreset('all')">All</button>
    <button class="botz-preset-btn" data-preset="today" onclick="applyPreset('today')">Today</button>
    <button class="botz-preset-btn" data-preset="7d" onclick="applyPreset('7d')">7D</button>
    <button class="botz-preset-btn" data-preset="30d" onclick="applyPreset('30d')">30D</button>
    <button class="botz-preset-btn" data-preset="custom" onclick="toggleCustomFilter()">Custom</button>
  </div>

  <!-- DATE FILTER (custom, hidden by default) -->
  <div class="botz-filter-bar" id="customFilterBar" style="display:none;">
    <span class="botz-filter-label">From</span>
    <input type="date" class="botz-date-input" id="filterFrom">
    <span class="botz-filter-label">To</span>
    <input type="date" class="botz-date-input" id="filterTo">
    <div class="botz-filter-actions">
      <button class="btn-outline" onclick="applyFilter()" style="padding:7px 14px; font-size:0.575rem;">FILTER</button>
      <button class="btn-ghost" onclick="clearFilter()" style="font-size:0.575rem;">CLEAR</button>
    </div>
  </div>

  <!-- LAST UPDATED -->
  <div class="botz-updated" id="lastUpdated"></div>

  <!-- TABS -->
  <div class="botz-tabs">
    <button class="botz-tab-btn active" data-tab="tracks" onclick="switchTab('tracks')">Tracks</button>
    <button class="botz-tab-btn" data-tab="albums" onclick="switchTab('albums')">Albums</button>
    <button class="botz-tab-btn" data-tab="recent" onclick="switchTab('recent')">Recent</button>
  </div>

  <!-- PANEL: TRACKS -->
  <div class="botz-panel active" id="panel-tracks">
    <div class="botz-section-label">Top Tracks</div>
    <div class="botz-row-list" id="trackList">
      <div class="botz-loading"><div class="botz-spinner"></div>Loading jams...</div>
    </div>
  </div>

  <!-- PANEL: ALBUMS -->
  <div class="botz-panel" id="panel-albums">
    <div class="botz-section-label">Top Albums</div>
    <div class="botz-row-list" id="albumList">
      <div class="botz-loading"><div class="botz-spinner"></div>Loading...</div>
    </div>
  </div>

  <!-- PANEL: RECENT -->
  <div class="botz-panel" id="panel-recent">
    <div class="botz-section-label">Recent Jams</div>
    <div class="botz-row-list" id="recentList">
      <div class="botz-loading"><div class="botz-spinner"></div>Loading...</div>
    </div>
  </div>

</div>

<!-- ── NOT LOGGED IN ── -->
<div id="notLoggedIn" style="display:none;" class="botz-not-logged">
  <div class="botz-not-logged-icon">🔒</div>
  <div class="botz-not-logged-title">NOT LOGGED IN</div>
  <div class="botz-not-logged-sub">Return to dashboard to sign in</div>
  <a href="dashboard.html" class="btn-outline" style="margin-top:8px; text-decoration:none;">← BACK TO MISSION</a>
</div>

<script>
  const API = 'https://xyivyebbafqwthvlwzlm.supabase.co/functions/v1/arirang-btsbackend'
  let currentAgentNo = null
  let activePreset = 'all'

  // ── INIT ──────────────────────────────────────────────────
  async function init() {
    let agentNo = null
    try {
      const saved = localStorage.getItem('arirang_agent')
      if (saved) {
        const agent = JSON.parse(saved)
        agentNo = agent.agentNo || agent.agent_no || null
      }
    } catch (e) { /* ignore */ }

    if (!agentNo) {
      document.getElementById('notLoggedIn').style.display = 'flex'
      return
    }

    currentAgentNo = agentNo
    document.getElementById('displayAgentNo').textContent = agentNo
    document.getElementById('mainContent').style.display = 'flex'
    initPullToRefresh()
    initNowPlaying()
    await loadJams()
  }

  // ── LOAD ──────────────────────────────────────────────────
  async function loadJams() {
    if (!currentAgentNo) return
    setLoading(true)

    const from = document.getElementById('filterFrom').value
    const to   = document.getElementById('filterTo').value
    let url = `${API}?action=getBotzJams&agentNo=${encodeURIComponent(currentAgentNo)}`
    if (from) url += `&from=${Math.floor(new Date(from + 'T00:00:00Z').getTime() / 1000)}`
    if (to)   url += `&to=${Math.floor(new Date(to + 'T23:59:59Z').getTime() / 1000)}`

    try {
      const res  = await fetch(url)
      const data = await res.json()
      if (!data.success) { setError(data.error || 'Failed'); return }
      render(data)
      updateLastUpdated()
    } catch (e) { setError('Network error') }
  }

  // ── NOW PLAYING ───────────────────────────────────────────
  function initNowPlaying() {
    if (!currentAgentNo) return

    async function poll() {
      try {
        const res  = await fetch(`${API}?action=getBotzNowPlaying&agentNo=${encodeURIComponent(currentAgentNo)}`)
        const data = await res.json()
        const bar  = document.getElementById('nowPlayingBar')
        if (data.success && data.playing) {
          document.getElementById('npTrack').textContent  = data.track  || '—'
          document.getElementById('npArtist').textContent = data.artist || ''
          bar.classList.add('visible')
        } else {
          bar.classList.remove('visible')
        }
      } catch (e) {}
    }

    poll()
    setInterval(poll, 30000)
  }

  // ── PRESETS ───────────────────────────────────────────────
  function applyPreset(preset) {
    activePreset = preset
    document.querySelectorAll('.botz-preset-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.preset === preset)
    )
    const customBar = document.getElementById('customFilterBar')
    if (preset === 'custom') {
      customBar.style.display = 'flex'
      return
    }
    customBar.style.display = 'none'
    const now = new Date()
    const pad = n => String(n).padStart(2, '0')
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`
    const today = fmt(now)
    let from = '', to = ''
    if (preset === 'today') { from = today; to = today }
    else if (preset === '7d') { const d = new Date(now); d.setDate(d.getDate()-6); from = fmt(d); to = today }
    else if (preset === '30d') { const d = new Date(now); d.setDate(d.getDate()-29); from = fmt(d); to = today }
    document.getElementById('filterFrom').value = from
    document.getElementById('filterTo').value   = to
    loadJams()
  }

  function toggleCustomFilter() {
    const bar = document.getElementById('customFilterBar')
    const showing = bar.style.display !== 'none'
    if (showing) {
      bar.style.display = 'none'
      applyPreset('all')
    } else {
      applyPreset('custom')
    }
  }

  // ── RENDER ────────────────────────────────────────────────
  function render(data) {
    document.getElementById('heroTotal').textContent = (data.total || 0).toLocaleString()
    renderTracks(data.topTracks || [])
    renderAlbums(data.topAlbums || [])
    renderRecent(data.recentJams || [])
  }

  function renderTracks(tracks) {
    const el = document.getElementById('trackList')
    if (!tracks.length) { el.innerHTML = '<div class="botz-empty">No jams yet</div>'; return }
    const max = tracks[0]?.jams || 1
    el.innerHTML = tracks.map((t, i) => {
      const pct = Math.round((t.jams / max) * 100)
      const rankClass = i === 0 ? ' rank-1' : ''
      return `
        <div class="botz-track-row${rankClass}" style="--bar-w:${pct}%">
          <span class="botz-rank">${i + 1}</span>
          <div class="botz-row-icon">🎵</div>
          <div class="botz-row-info">
            <div class="botz-row-name">${esc(t.name)}</div>
            ${t.artist ? `<div class="botz-row-sub">${esc(t.artist)}</div>` : ''}
          </div>
          <div class="botz-row-count">
            <div class="botz-row-count-num">${t.jams}</div>
            <div class="botz-row-count-label">jams</div>
          </div>
        </div>`
    }).join('')
  }

  function renderAlbums(albums) {
    const el = document.getElementById('albumList')
    if (!albums.length) { el.innerHTML = '<div class="botz-empty">No albums yet</div>'; return }
    const max = albums[0]?.jams || 1
    el.innerHTML = albums.map((a, i) => {
      const pct = Math.round((a.jams / max) * 100)
      const rankClass = i === 0 ? ' rank-1' : ''
      return `
        <div class="botz-track-row${rankClass}" style="--bar-w:${pct}%">
          <span class="botz-rank">${i + 1}</span>
          <div class="botz-row-icon">💿</div>
          <div class="botz-row-info">
            <div class="botz-row-name">${esc(a.name)}</div>
          </div>
          <div class="botz-row-count">
            <div class="botz-row-count-num">${a.jams}</div>
            <div class="botz-row-count-label">jams</div>
          </div>
        </div>`
    }).join('')
  }

  function renderRecent(jams) {
    const el = document.getElementById('recentList')
    if (!jams.length) { el.innerHTML = '<div class="botz-empty">No recent jams</div>'; return }
    el.innerHTML = jams.map(j => {
      const d = j.at ? new Date(j.at * 1000) : null
      const meta = [j.artist, j.album].filter(Boolean).join(' · ')
      return `
        <div class="botz-recent-row">
          <div class="botz-recent-dot"></div>
          <div class="botz-recent-info">
            <div class="botz-recent-name">${esc(j.track || '—')}</div>
            ${meta ? `<div class="botz-recent-meta">${esc(meta)}</div>` : ''}
          </div>
          <div class="botz-recent-time">${d ? relTime(d) : ''}</div>
        </div>`
    }).join('')
  }

  // ── TABS ──────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.botz-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab))
    document.querySelectorAll('.botz-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab))
  }

  // ── FILTER ────────────────────────────────────────────────
  function applyFilter() { loadJams() }
  function clearFilter() {
    document.getElementById('filterFrom').value = ''
    document.getElementById('filterTo').value = ''
    loadJams()
  }

  // ── LAST UPDATED ──────────────────────────────────────────
  function updateLastUpdated() {
    const el = document.getElementById('lastUpdated')
    const now = new Date()
    const pad = n => String(n).padStart(2, '0')
    el.textContent = `Updated ${pad(now.getHours())}:${pad(now.getMinutes())}`
  }

  // ── PULL-TO-REFRESH ───────────────────────────────────────
  function initPullToRefresh() {
    let startY = 0, pulling = false, threshold = 60
    const ptr = document.getElementById('ptrBar')
    const ptrText = document.getElementById('ptrText')
    const content = document.getElementById('mainContent')

    content.addEventListener('touchstart', e => {
      if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true }
    }, { passive: true })

    content.addEventListener('touchmove', e => {
      if (!pulling) return
      const diff = e.touches[0].clientY - startY
      if (diff > 10) {
        ptr.classList.add('visible')
        if (diff >= threshold) {
          ptr.classList.add('ready')
          ptrText.textContent = 'Release to refresh'
        } else {
          ptr.classList.remove('ready')
          ptrText.textContent = 'Pull to refresh'
        }
      }
    }, { passive: true })

    content.addEventListener('touchend', e => {
      if (!pulling) return
      pulling = false
      const diff = e.changedTouches[0].clientY - startY
      ptr.classList.remove('visible', 'ready')
      ptrText.textContent = 'Pull to refresh'
      if (diff >= threshold) loadJams()
    }, { passive: true })
  }

  // ── HELPERS ───────────────────────────────────────────────
  function skeletonRows(n) {
    return Array.from({length: n}, () => `
      <div class="botz-skeleton-row">
        <div class="botz-skel botz-skel-icon"></div>
        <div class="botz-skel-lines">
          <div class="botz-skel botz-skel-name"></div>
          <div class="botz-skel botz-skel-sub"></div>
        </div>
        <div class="botz-skel botz-skel-num"></div>
      </div>`).join('')
  }

  function setLoading(on) {
    if (!on) return
    const s = skeletonRows(5)
    document.getElementById('trackList').innerHTML = s
    document.getElementById('albumList').innerHTML = s
    document.getElementById('recentList').innerHTML = s
    document.getElementById('heroTotal').textContent = '—'
    document.getElementById('lastUpdated').textContent = ''
  }

  function setError(msg) {
    const h = `<div class="botz-empty">${esc(msg)}<br><button class="botz-retry-btn" onclick="loadJams()">↺ Retry</button></div>`
    document.getElementById('trackList').innerHTML = h
    document.getElementById('albumList').innerHTML = h
    document.getElementById('recentList').innerHTML = h
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function relTime(d) {
    const diff = Date.now() - d
    if (diff < 60000)      return 'just now'
    if (diff < 3600000)    return Math.floor(diff / 60000) + 'm ago'
    if (diff < 86400000)   return Math.floor(diff / 3600000) + 'h ago'
    if (diff < 604800000)  return Math.floor(diff / 86400000) + 'd ago'
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
  }

  init()
</script>
</body>
</html>
